<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora QR Studio</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#050505,#07140f);
  color:white;
  min-height:100vh;
  padding:25px;
}

.container{
  max-width:1000px;
  margin:auto;
}

h1{
  color:#00ff88;
  font-size:52px;
  margin-bottom:8px;
}

p{
  color:#ccc;
  margin-bottom:25px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

.panel{
  background:#101010;
  border:1px solid #00ff88;
  border-radius:20px;
  padding:25px;
}

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

input, select{
  width:100%;
  margin-top:6px;
  padding:13px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  width:100%;
  margin-top:20px;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#00ff88;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.preview{
  background:white;
  color:#111;
  border-radius:22px;
  padding:28px;
  text-align:center;
}

.preview h2{
  font-size:36px;
  margin-bottom:5px;
}

.preview p{
  color:#333;
  margin-bottom:20px;
}

#qrcode{
  display:flex;
  justify-content:center;
  margin:20px 0;
}

.footer-text{
  font-weight:bold;
  margin-top:15px;
}

@media(max-width:800px){
  .grid{grid-template-columns:1fr}
  h1{font-size:40px}
}
</style>
</head>

<body>

<div class="container">
  <h1>Nexora QR Studio</h1>
  <p>Generá QR personalizados para cartas, negocios, eventos o redes sociales.</p>

  <div class="grid">

    <div class="panel">
      <label>Nombre del negocio</label>
      <input id="businessName" value="KUBO BAR">

      <label>Texto principal</label>
      <input id="mainText" value="Escaneá y mirá nuestra carta">

      <label>Link del QR</label>
      <input id="qrLink" value="https://kubo-cartas.vercel.app/">

      <label>Texto inferior</label>
      <input id="footerText" value="Comidas • Bebidas • Tragos">

      <label>Color principal</label>
      <input id="mainColor" type="color" value="#ff2020">

      <button onclick="generateQR()">Generar QR</button>
      <button onclick="downloadQR()">Descargar QR</button>
      <button onclick="downloadPoster()">Descargar cartel</button>
    </div>

    <div class="panel">
      <div class="preview" id="poster">
        <h2 id="previewBusiness">KUBO BAR</h2>
        <p id="previewText">Escaneá y mirá nuestra carta</p>

        <div id="qrcode"></div>

        <div class="footer-text" id="previewFooter">
          Comidas • Bebidas • Tragos
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let qr;

function generateQR(){
  const name = document.getElementById("businessName").value;
  const text = document.getElementById("mainText").value;
  const link = document.getElementById("qrLink").value;
  const footer = document.getElementById("footerText").value;
  const color = document.getElementById("mainColor").value;

  document.getElementById("previewBusiness").innerText = name;
  document.getElementById("previewText").innerText = text;
  document.getElementById("previewFooter").innerText = footer;
  document.getElementById("previewBusiness").style.color = color;

  document.getElementById("qrcode").innerHTML = "";

  qr = new QRCode(document.getElementById("qrcode"), {
    text: link,
    width: 220,
    height: 220,
    colorDark: "#000000",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
}

function downloadQR(){
  const img = document.querySelector("#qrcode img");
  if(!img){
    alert("Primero generá el QR");
    return;
  }

  const a = document.createElement("a");
  a.href = img.src;
  a.download = "qr-nexora.png";
  a.click();
}

function downloadPoster(){
  window.print();
}

generateQR();
</script>

</body>
</html>
